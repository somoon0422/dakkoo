name: dakkoo
description: "감성 일기 + 다이어리 꾸미기 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  pdf: ^3.11.2
  archive: ^4.0.4
  table_calendar: ^3.2.0
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_colorpicker: ^1.1.0
  path: ^1.9.0
  perfect_freehand: ^2.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/backgrounds/
